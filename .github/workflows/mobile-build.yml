name: Mobile App Build

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android

jobs:
  # ============================================
  # BUILD ANDROID (APK)
  # ============================================
  build-android:
    name: Build Android
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          API_BASE_URL=${{ secrets.API_BASE_URL }}
          EXAM_BASE_URL=${{ secrets.EXAM_BASE_URL }}
          TELEGRAM_BOT_USERNAME=${{ secrets.TELEGRAM_BOT_USERNAME }}
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Setup Android signing
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          cat > android/key.properties << EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MockCenter-Android-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ============================================
  # BUILD IOS (IPA)
  # ============================================
  build-ios:
    name: Build iOS
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios'))
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          API_BASE_URL=${{ secrets.API_BASE_URL }}
          EXAM_BASE_URL=${{ secrets.EXAM_BASE_URL }}
          TELEGRAM_BOT_USERNAME=${{ secrets.TELEGRAM_BOT_USERNAME }}
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: cd ios && pod install

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Create IPA from build
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r MockCenter.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MockCenter-iOS-ipa
          path: mobile/build/ios/ipa/MockCenter.ipa
          retention-days: 30

  # ============================================
  # SEND TO TELEGRAM
  # ============================================
  notify-telegram:
    name: Send to Telegram
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: always() && (needs.build-android.result == 'success' || needs.build-ios.result == 'success')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: List downloaded files
        run: find artifacts -type f 2>/dev/null | head -20 || echo "No artifacts found"

      - name: Send Android APK to Telegram
        if: needs.build-android.result == 'success'
        continue-on-error: true
        run: |
          FILE=$(find artifacts/MockCenter-Android-apk -name "*.apk" 2>/dev/null | head -1)
          if [ -f "$FILE" ]; then
            curl -F document=@"$FILE" \
                 -F caption="🤖 Android APK
          📦 MockCenter Mobile
          🔖 ${{ github.ref_name }}
          📝 ${{ github.event.head_commit.message || 'Manual build' }}" \
                 "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}"
          fi

      - name: Send iOS IPA to Telegram
        if: needs.build-ios.result == 'success'
        continue-on-error: true
        run: |
          FILE=$(find artifacts/MockCenter-iOS-ipa -name "*.ipa" 2>/dev/null | head -1)
          if [ -f "$FILE" ]; then
            curl -F document=@"$FILE" \
                 -F caption="🍎 iOS IPA
          📦 MockCenter Mobile
          🔖 ${{ github.ref_name }}
          📝 ${{ github.event.head_commit.message || 'Manual build' }}" \
                 "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}"
          fi

      - name: Send summary message
        run: |
          ANDROID="${{ needs.build-android.result == 'success' && '✅' || (needs.build-android.result == 'skipped' && '⏭️' || '❌') }}"
          IOS="${{ needs.build-ios.result == 'success' && '✅' || (needs.build-ios.result == 'skipped' && '⏭️' || '❌') }}"

          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
               -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
               -d parse_mode="HTML" \
               -d text="📱 <b>Mobile Build Complete!</b>

          📦 <b>MockCenter Mobile</b>
          🔖 Version: <code>${{ github.ref_name }}</code>

          ${ANDROID} Android APK
          ${IOS} iOS IPA

          🔗 <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View Logs</a>"
